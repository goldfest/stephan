spring.application.name=social-network-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/social_network_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:5558}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


app.jwt.secret=exam-social-network-super-secret-key-please-change-in-production-2026
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

springdoc.swagger-ui.path=/swagger-ui.html
